name: Publish pinned GTK4 Flutter engine

on:
  workflow_dispatch:
    inputs:
      artifact_id:
        description: Artifact ID from a successful pinned engine build
        required: true
        type: string
      library_sha256:
        description: Expected SHA-256 of libflutter_linux_gtk4.so
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  FLUTTER_SDK_REVISION: 00fee9824a795ee9b5794e0a0e2bc5975e54dba8

jobs:
  stage:
    name: Verify publication input
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read

    steps:
      - name: Download exact build artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
        run: |
          set -euxo pipefail
          [[ $ARTIFACT_ID =~ ^[0-9]+$ ]]
          curl --fail --location --retry 3 \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" \
            --output "$RUNNER_TEMP/engine-artifact.zip"
          mkdir "$RUNNER_TEMP/engine-artifact"
          unzip -q "$RUNNER_TEMP/engine-artifact.zip" -d "$RUNNER_TEMP/engine-artifact"
          find "$RUNNER_TEMP/engine-artifact" -maxdepth 2 -type f -printf '%P %s\n' | sort

      - name: Verify engine identity and linkage
        shell: bash
        env:
          EXPECTED_SHA256: ${{ inputs.library_sha256 }}
        run: |
          set -euxo pipefail
          artifact="$RUNNER_TEMP/engine-artifact"
          library="$artifact/libflutter_linux_gtk4.so"
          metadata="$artifact/engine-metadata.json"
          [[ $EXPECTED_SHA256 =~ ^[0-9a-f]{64}$ ]]
          test -f "$library"
          test -f "$metadata"
          test -f "$artifact/libflutter_linux_gtk4.so.sha256"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$library" | sha256sum --check
          (
            cd "$artifact"
            sha256sum --check libflutter_linux_gtk4.so.sha256
          )
          readelf --dynamic --wide "$library" | grep -F 'Shared library: [libgtk-4.so.1]'
          if readelf --dynamic --wide "$library" | grep -Fq 'Shared library: [libgtk-3.so.0]'; then
            echo 'GTK4 engine directly links GTK3' >&2
            exit 1
          fi
          EXPECTED_SHA256="$EXPECTED_SHA256" METADATA="$metadata" python3 - <<'PY'
          import json
          import os
          import pathlib

          metadata = json.loads(pathlib.Path(os.environ["METADATA"]).read_text())
          expected = {
              "schema": 1,
              "platform": "linux-x64-release",
              "library": "libflutter_linux_gtk4.so",
              "library_sha256": os.environ["EXPECTED_SHA256"],
              "flutter_sdk_revision": os.environ["FLUTTER_SDK_REVISION"],
              "runtime_mode": "release",
              "tests": 620,
          }
          actual = {key: metadata.get(key) for key in expected}
          if actual != expected:
              raise SystemExit(f"engine metadata mismatch: expected {expected}, got {actual}")
          PY

      - name: Create versioned Pages tree
        shell: bash
        env:
          EXPECTED_SHA256: ${{ inputs.library_sha256 }}
          SOURCE_ARTIFACT_ID: ${{ inputs.artifact_id }}
        run: |
          set -euxo pipefail
          artifact="$RUNNER_TEMP/engine-artifact"
          destination="$RUNNER_TEMP/site/flutter-engine/$FLUTTER_SDK_REVISION"
          mkdir -p "$destination"
          install -m 0644 "$artifact/libflutter_linux_gtk4.so" "$destination/"
          install -m 0644 "$artifact/libflutter_linux_gtk4.so.sha256" "$destination/"
          install -m 0644 "$artifact/engine-metadata.json" "$destination/"
          DESTINATION="$destination" \
          EXPECTED_SHA256="$EXPECTED_SHA256" \
          SOURCE_ARTIFACT_ID="$SOURCE_ARTIFACT_ID" \
          python3 - <<'PY'
          import json
          import os
          import pathlib

          destination = pathlib.Path(os.environ["DESTINATION"])
          index = {
              "artifact_id": int(os.environ["SOURCE_ARTIFACT_ID"]),
              "flutter_sdk_revision": os.environ["FLUTTER_SDK_REVISION"],
              "library": "libflutter_linux_gtk4.so",
              "library_sha256": os.environ["EXPECTED_SHA256"],
              "metadata": "engine-metadata.json",
              "schema": 1,
          }
          (destination / "index.json").write_text(
              json.dumps(index, indent=2, sort_keys=True) + "\n"
          )
          root = destination.parents[1]
          (root / "index.html").write_text(
              "<!doctype html><meta charset=utf-8>"
              "<title>flutter-dev build artifacts</title>"
              "<h1>flutter-dev build artifacts</h1>"
              "<p>Machine-consumed pinned artifacts; verify SHA-256 before use.</p>\n"
          )
          PY
          find "$RUNNER_TEMP/site" -type f -printf '%P %s\n' | sort

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ${{ runner.temp }}/site
          retention-days: 1

  deploy:
    name: Deploy public engine artifact
    needs: stage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
