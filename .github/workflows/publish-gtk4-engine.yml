name: Publish pinned GTK4 Flutter engine

on:
  workflow_dispatch:
    inputs:
      artifact_id:
        description: Artifact ID from a successful pinned engine build
        required: true
        type: string
      library_sha256:
        description: Expected SHA-256 of libflutter_linux_gtk4.so
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pinned-gtk4-flutter-engine-release
  cancel-in-progress: false

env:
  FLUTTER_SDK_REVISION: 00fee9824a795ee9b5794e0a0e2bc5975e54dba8
  ENGINE_CONTENT_HASH: 469f2b34de41cab5f677ba84d6e9099c0e682d1e
  DART_REVISION: d402ff7c9c8442d64aa8148609480aa0e04a24fd
  DEPOT_TOOLS_REVISION: 9073d17d5650ede601bc1f59c822973d2c25b86a
  RELEASE_TAG: flutter-engine-gtk4-00fee9824a795ee9b5794e0a0e2bc5975e54dba8

jobs:
  publish:
    name: Verify and publish immutable release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download exact build artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ inputs.artifact_id }}
        run: |
          set -euxo pipefail
          [[ $ARTIFACT_ID =~ ^[0-9]+$ ]]
          curl --fail --location --retry 3 \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" \
            --output "$RUNNER_TEMP/engine-artifact.zip"
          mkdir "$RUNNER_TEMP/engine-artifact"
          unzip -q "$RUNNER_TEMP/engine-artifact.zip" -d "$RUNNER_TEMP/engine-artifact"
          find "$RUNNER_TEMP/engine-artifact" -maxdepth 1 -type f -printf '%f %s\n' | sort

      - name: Verify engine identity and linkage
        shell: bash
        env:
          EXPECTED_SHA256: ${{ inputs.library_sha256 }}
        run: |
          set -euxo pipefail
          artifact="$RUNNER_TEMP/engine-artifact"
          library="$artifact/libflutter_linux_gtk4.so"
          metadata="$artifact/engine-metadata.json"
          [[ $EXPECTED_SHA256 =~ ^[0-9a-f]{64}$ ]]
          test -f "$library"
          test -f "$metadata"
          test -f "$artifact/libflutter_linux_gtk4.so.sha256"
          test -f "$artifact/gtk4-engine-tests.log"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$library" | sha256sum --check
          (
            cd "$artifact"
            sha256sum --check libflutter_linux_gtk4.so.sha256
          )
          readelf --dynamic --wide "$library" | grep -F 'Shared library: [libgtk-4.so.1]'
          if readelf --dynamic --wide "$library" | grep -Fq 'Shared library: [libgtk-3.so.0]'; then
            echo 'GTK4 engine directly links GTK3' >&2
            exit 1
          fi
          if readelf --sections --wide "$library" | grep -Eq '\.debug_(info|line)\b'; then
            echo 'GTK4 engine contains debug sections' >&2
            exit 1
          fi
          grep -F '[  PASSED  ] 620 tests.' "$artifact/gtk4-engine-tests.log"
          EXPECTED_SHA256="$EXPECTED_SHA256" METADATA="$metadata" python3 - <<'PY'
          import json
          import hashlib
          import os
          import pathlib

          metadata_path = pathlib.Path(os.environ["METADATA"])
          library = metadata_path.with_name("libflutter_linux_gtk4.so")
          metadata = json.loads(metadata_path.read_text())
          expected = {
              "schema": 1,
              "platform": "linux-x64-release",
              "library": "libflutter_linux_gtk4.so",
              "library_sha256": os.environ["EXPECTED_SHA256"],
              "library_size": library.stat().st_size,
              "flutter_sdk_revision": os.environ["FLUTTER_SDK_REVISION"],
              "engine_content_hash": os.environ["ENGINE_CONTENT_HASH"],
              "dart_revision": os.environ["DART_REVISION"],
              "depot_tools_revision": os.environ["DEPOT_TOOLS_REVISION"],
              "gn_target": "flutter/shell/platform/linux:flutter_gtk",
              "gn_out": "host_release_gtk4",
              "runtime_mode": "release",
              "tests": 620,
          }
          if hashlib.sha256(library.read_bytes()).hexdigest() != os.environ["EXPECTED_SHA256"]:
              raise SystemExit("engine library changed during metadata validation")
          actual = {key: metadata.get(key) for key in expected}
          if actual != expected:
              raise SystemExit(f"engine metadata mismatch: expected {expected}, got {actual}")
          PY

      - name: Publish immutable GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA256: ${{ inputs.library_sha256 }}
          SOURCE_ARTIFACT_ID: ${{ inputs.artifact_id }}
        run: |
          set -euxo pipefail
          test "$GITHUB_REF" = refs/heads/main
          gh api "repos/$GITHUB_REPOSITORY/immutable-releases" \
            --jq '.enabled' | grep -Fx true
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG" >&2
            exit 1
          fi
          artifact="$RUNNER_TEMP/engine-artifact"
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          Pinned Linux x64 release Flutter engine with GTK4 embedding support.

          - Flutter SDK revision: \`$FLUTTER_SDK_REVISION\`
          - Library SHA-256: \`$EXPECTED_SHA256\`
          - Source Actions artifact ID: \`$SOURCE_ARTIFACT_ID\`
          - GTK4 engine tests: 620 passed

          Consumers must use the exact Flutter SDK revision above, run its normal
          Linux precache, verify the checksum, and install only
          \`libflutter_linux_gtk4.so\` into
          \`bin/cache/artifacts/engine/linux-x64-release\`.
          EOF
          gh release create "$RELEASE_TAG" \
            "$artifact/libflutter_linux_gtk4.so" \
            "$artifact/libflutter_linux_gtk4.so.sha256" \
            "$artifact/engine-metadata.json" \
            "$artifact/gtk4-engine-tests.log" \
            --draft \
            --latest=false \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Flutter GTK4 engine $FLUTTER_SDK_REVISION"
          gh release edit "$RELEASE_TAG" \
            --draft=false \
            --latest=false \
            --repo "$GITHUB_REPOSITORY"

      - name: Verify published release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA256: ${{ inputs.library_sha256 }}
        run: |
          set -euxo pipefail
          destination="$RUNNER_TEMP/published"
          mkdir "$destination"
          gh release download "$RELEASE_TAG" \
            --dir "$destination" \
            --repo "$GITHUB_REPOSITORY"
          test "$(find "$destination" -maxdepth 1 -type f | wc -l)" -eq 4
          printf '%s  %s\n' \
            "$EXPECTED_SHA256" \
            "$destination/libflutter_linux_gtk4.so" \
            | sha256sum --check
          release=$(gh release view "$RELEASE_TAG" \
            --json isDraft,isImmutable,isPrerelease,tagName,url \
            --repo "$GITHUB_REPOSITORY")
          printf '%s\n' "$release"
          jq -e \
            --arg tag "$RELEASE_TAG" \
            '.isDraft == false and .isImmutable == true and .isPrerelease == false and .tagName == $tag' \
            <<<"$release"
